name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Assemble release directory
        run: |
          mkdir -p PoeBuildExporter-${{ github.ref_name }}/logs
          cp target/PoeBuildExporter-1.0-SNAPSHOT.jar PoeBuildExporter-${{ github.ref_name }}/
          cp -r properties PoeBuildExporter-${{ github.ref_name }}/

      - name: Create zip
        run: zip -r PoeBuildExporter-${{ github.ref_name }}.zip PoeBuildExporter-${{ github.ref_name }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PoeBuildExporter-${{ github.ref_name }}.zip
