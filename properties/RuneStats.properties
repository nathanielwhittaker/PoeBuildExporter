# Socket augment name (as it appears after "Rune:" in POB item data, case-insensitive)
# -> comma-separated stat substrings matched against the normalized stat searchKey (lowercase, numbers as #)
# Each entry lists ALL stat variants the augment can produce across weapon/wand/armour slot types.
# Local defence stats (increased armour, evasion, energy shield) are already excluded elsewhere.

